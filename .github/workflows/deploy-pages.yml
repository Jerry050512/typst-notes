name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v3
        with:
          typst-version: 'latest'

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install shiroa
        run: |
          mkdir -p tools/shiroa
          curl -L -o /tmp/shiroa.tar.gz https://github.com/Myriad-Dreamin/shiroa/releases/download/v0.3.1-rc4/shiroa-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf /tmp/shiroa.tar.gz -C tools/shiroa --strip-components=1
          chmod +x tools/shiroa/shiroa
          echo "$PWD/tools/shiroa" >> $GITHUB_PATH

      # build.ts 会把字体下载到 tools/fonts/source-han-serif，缓存该目录避免重复下载
      - name: Cache Source Han Serif fonts
        id: cache-fonts
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/tools/fonts/source-han-serif
          key: ${{ runner.os }}-source-han-serif-2.003R

      - name: Build web site
        env:
          BASE_PATH: ${{ vars.CUSTOM_DOMAIN != '' && '/' || format('/{0}/', github.event.repository.name) }}
        run: bun run scripts/build.ts

      - name: Generate CNAME for GitHub Pages
        if: ${{ vars.CUSTOM_DOMAIN != '' }}
        run: echo "${{ vars.CUSTOM_DOMAIN }}" > dist/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
