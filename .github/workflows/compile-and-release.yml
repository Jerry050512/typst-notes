name: Compile and Release Typst Notes

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install Typst
      uses: typst-community/setup-typst@v3
      with:
        typst-version: 'latest'
        
    - name: Install Source Han Serif fonts
      run: |
        # Create fonts directory
        mkdir -p ~/.local/share/fonts
        
        # Create separate directories for each font to avoid conflicts
        mkdir -p font-cn font-tw
        
        # Download and install Source Han Serif CN (Simplified Chinese)
        echo "Installing Source Han Serif CN..."
        cd font-cn
        wget -q https://github.com/adobe-fonts/source-han-serif/releases/download/2.003R/14_SourceHanSerifCN.zip
        unzip -o -q 14_SourceHanSerifCN.zip
        find ./SubsetOTF/CN/ -name "*.otf" -exec cp {} ~/.local/share/fonts/ \;
        cd ..
        
        # Download and install Source Han Serif TW (Traditional Chinese - Taiwan)
        echo "Installing Source Han Serif TW..."
        cd font-tw
        wget -q https://github.com/adobe-fonts/source-han-serif/releases/download/2.003R/15_SourceHanSerifTW.zip
        unzip -o -q 15_SourceHanSerifTW.zip
        find ./SubsetOTF/TW/ -name "*.otf" -exec cp {} ~/.local/share/fonts/ \;
        cd ..
        
        # Clean up downloaded files
        rm -rf font-cn font-tw
        
        # Update font cache
        fc-cache -f -v
        
        # List installed fonts for verification
        echo "Installed Source Han Serif fonts:"
        fc-list | grep -i "source han serif" || echo "No Source Han Serif fonts found"
        
    - name: Find and compile Typst files
      run: |
        # Create output directories
        mkdir -p compiled-pdfs/active
        mkdir -p compiled-pdfs/archived

        # Find all note.typ and practice.typ files
        echo "Finding Typst files to compile..."

        # Compile active note.typ files (exclude archive directory)
        echo "=== Compiling active notes ==="
        find . -name "note.typ" -type f -not -path "./archive/*" | while read -r file; do
          dir=$(dirname "$file")
          dirname=$(basename "$dir")
          echo "Compiling $file -> ${dirname}-note.pdf"
          typst compile --root ../ "$file" "compiled-pdfs/active/${dirname}-note.pdf"
        done

        # Compile active practice.typ files (exclude archive directory)
        find . -name "practice.typ" -type f -not -path "./archive/*" | while read -r file; do
          dir=$(dirname "$file")
          dirname=$(basename "$dir")
          echo "Compiling $file -> ${dirname}-practice.pdf"
          typst compile --root ../ "$file" "compiled-pdfs/active/${dirname}-practice.pdf"
        done

        # Compile archived note.typ files
        echo "=== Compiling archived notes ==="
        find ./archive -name "note.typ" -type f | while read -r file; do
          dir=$(dirname "$file")
          dirname=$(basename "$dir")
          echo "Compiling $file -> ${dirname}-note.pdf"
          typst compile --root ../ "$file" "compiled-pdfs/archived/${dirname}-note.pdf"
        done

        # Compile archived practice.typ files
        find ./archive -name "practice.typ" -type f | while read -r file; do
          dir=$(dirname "$file")
          dirname=$(basename "$dir")
          echo "Compiling $file -> ${dirname}-practice.pdf"
          typst compile --root ../ "$file" "compiled-pdfs/archived/${dirname}-practice.pdf"
        done

        # Create archive zip
        if [ -d "compiled-pdfs/archived" ] && [ "$(ls -A compiled-pdfs/archived)" ]; then
          echo "=== Creating archived notes package ==="
          cd compiled-pdfs/archived
          zip -r ../archived-notes.zip *.pdf
          cd ../..
          echo "Archived notes packaged into archived-notes.zip"
        fi

        # List compiled files
        echo "=== Active PDFs ==="
        ls -la compiled-pdfs/active/
        echo "=== Archived PDFs ==="
        ls -la compiled-pdfs/archived/
        echo "=== Archive Package ==="
        ls -lh compiled-pdfs/*.zip 2>/dev/null || echo "No archive package created"
        
    - name: Upload active PDFs artifact
      uses: actions/upload-artifact@v4
      with:
        name: active-pdfs
        path: compiled-pdfs/active/

    - name: Upload archived notes package artifact
      uses: actions/upload-artifact@v4
      if: hashFiles('compiled-pdfs/archived-notes.zip') != ''
      with:
        name: archived-notes
        path: compiled-pdfs/archived-notes.zip
        
    - name: Create development release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: dev-${{ github.sha }}
        name: Development Release (dev-${{ github.sha }})
        body: |
          Automated development release from commit ${{ github.sha }}

          ## 📚 Active Notes (Individual PDFs)
          Recently updated course notes - download individually as needed.

          ## 📦 Archived Notes (archived-notes.zip)
          Older course notes packaged together in a single zip file.
        files: |
          compiled-pdfs/active/*
          compiled-pdfs/archived-notes.zip
        prerelease: true
        
    - name: Create stable release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        body: |
          Stable release ${{ github.ref_name }}

          ## 📚 Active Notes (Individual PDFs)
          Recently updated course notes - download individually as needed.

          ## 📦 Archived Notes (archived-notes.zip)
          Older course notes packaged together in a single zip file.
        files: |
          compiled-pdfs/active/*
          compiled-pdfs/archived-notes.zip
        prerelease: false